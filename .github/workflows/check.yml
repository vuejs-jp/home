name: Check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24.14.1
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Run vp check
        run: vp check

      - name: Run Vize SFC checks
        run: vp run check:sfc

      - name: Build SSG output
        run: vp run ssg
